body:
  text: 姚秦三藏法師鳩摩羅什譯明曹溪沙門憨山釋德清撰金剛般若波羅蜜經金剛二字解者都以堅利能斷為義此泛説也然西域實有金剛寶此寶最堅不可壞且能壞一切物謂取此寶以喻般若能斷煩惱此雖近理總非佛意特尋常宿習知見耳蓋般若此云智慧乃是佛的心所謂佛智慧也波羅蜜義云到彼岸乃指此心極盡處也今題云金剛般若波羅蜜標此經所説特顯佛一片金剛心耳且金剛心乃佛修因證果之本心今出世教化衆生全用此心今教菩薩以金剛心為本修因為入大乘之初門故特示之以斷疑也以此心不是世間衆生常情故舉世不能知佛且佛原不是世間人而今平空走到人間來則人人見而生疑矣及其日用行事件件不與人同説話不同規矩不同事事法法與世間相反故動而見疑宜其諸天魔王皆欲害調達阿闍皆要殺而一切人皆生謗也故曰我出世間一切天人阿修羅外道魔王皆當驚疑是也不但天人生疑即弟子中上首如迦葉等舉皆疑佛以所説法乍空乍有乍是乍非或讚或斥或獎或呵全無一定之言而諸弟子聞者皆疑而不信故曰將非魔作佛惱亂我心耶上首尚乃如此則新學可知以佛所説法難信難解故然佛出世一番説法則今已三十年矣弟子猶且懷疑而不信是則佛之含冤蓋已久矣今日幸喜空生有些見處窺見世尊一斑忽生讚歎故世尊因其疑而決破之乃披露自己一片金剛真心表白與他使其了悟不疑令諸聞者羣疑頓斷故此經乃佛的示自心以斷弟子學佛者之疑不是説般若能斷衆生煩惱也如其不然但看經中一一皆是空生之疑疑佛之心佛表此心以破彼疑何嘗説以智慧斷衆生煩惱耶故此經題單是法非以喻也但斷得弟子疑就斷得衆生煩惱此經一味只是斷疑生信為主以學道之人以信為本以疑作障故疑有三種謂疑人疑法疑己疑人謂認人不真即如弟子聞佛説色身法身大身小身不知那箇是真佛此疑人也且其説法方才説有却又説空方才説空却又説不空以其言不一故最可疑此疑法也或有聞而能信不疑於法又見其法大則疑自己根小不堪領荷不能修行此疑己也今此經中三疑都有佛隨空生所疑處即便逐破頓斷彼疑所謂疑悔永已盡安住實智中此經之旨也此經此方解者極多都不合佛意獨西域天親菩薩以二十七疑分經極是但意出於聖人而論傳此方已經翻譯且譯人有巧拙不同言不達意反生滯礙使學人難省此微妙幽旨非口所宣一落言詮便成渣滓況著粗浮文字何以達妙此注述之難於描寫佛心不無救顰之醜即如世人作行狀但可述事不能傳神此其難也故今決疑解妙在先得空生之疑為主若疑情全露則佛破疑之説不待解而自明矣故此解先出疑在本文之前節節按迹而破之忘言領悟自得其宗如是我聞一時佛在舍衛國祇樹給孤獨園與大比邱衆千二百五十人俱解此是佛住世説法儀式諸説備釋此不繁衍爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐解此是佛住世家常過活日用處動容與衆一般更無別奇特只是就裏一點與人不同知之者希時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊解如來住世日用尋常與人一般就裏一點不同處人人對面不知今日忽被空生勘破故歎曰希有嗟乎如來與諸弟子周旋三十年矣一向不知佛行履處不知故作等間放過只道與衆人一般所以凡佛所言多疑而不信若不是空生透則終無知佛者耶如來善護念諸菩薩善付囑諸菩薩解此空生歎佛希有處正是親見如來此一片苦心也菩薩乃學佛之弟子即昔在小乘中初發大乘心者乃空亂意菩薩也一向佛為護念此輩更無別意只是要付囑此心耳護念者以佛出世本願只欲令一切衆生與佛無異人人成佛方盡此心但衆生德薄垢重心志怯弱不能擔荷如嬰兒一般佛如慈母之護念嬰兒則無一息放下種種周悉調護愛念故如保赤子所謂護念只欲一切衆生直至成佛而後已故曰付囑然不敢明言但密密方便而將就之故曰善經云我以無量無數方便引導衆生欲令一切衆生皆悉到於一切智地是謂護念付囑世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心解此空生特問安心之方法也以初在小乘時單肯自度不肯度生故心小今蒙如來二十餘年多方淘汰激起度生之心故名大心衆生為菩薩要令下化衆生將以上求佛果此輩自肯利生故曰發菩提心此空生已信佛心矣但見初發大心菩薩未悟實相真空與前所取偏空二者難辨以前小乘涅槃可以取著安住其心今既捨前空而未得真空所謂進無新證退失故居名空亂意以一向執著名言習氣未忘要有住著又執著一定有佛果可求將謂求至佛果便是住處耳且要上求佛果必欲下化衆生衆生度盡方得成佛而今滿眼看見三千大千世界衆生無量無邊幾時能度得盡衆生不盡如何得成佛果以求住之心急故此心不安不能降伏故空生特為請安住其心降伏其心之方法耳然空生已見佛心而嘆希有矣且開口單問此二語者何也以衆心各謂世尊今日是已成之果矣故我見世尊如此日用安心自在即今初發心求佛果之人其心不定當如何安住如何降伏耶此問意也安心者如二祖侍達磨乞安心法磨云將心來與汝安祖云覓心了不可得磨云與汝安心竟然在祖師門下一言便了所以為宗今世尊便説了許多安心之法婆心漏逗所以為教到底只是箇覓心了不可得故四祖以前皆以楞伽印心至黃梅六祖皆以金剛印心故此經非文字相不可作言語文字看全在離言之妙其經中凡言於汝意云何皆反徵其疑也以衆心隨語起疑雖未吐露而心已動念謂之意言分別正是名言習氣耳佛言善哉善哉須菩提如汝所説如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝説善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心解空生所問意謂發心菩薩不得似佛這等安心自在將謂若求作佛必須象佛日用行履一般方才是佛我觀佛心如此安間而菩薩心不得安住如何降伏使心安耶佛答意云菩薩要求心安作佛不必別求只如汝會得我護念付囑之心其心自安亦不必別樣降伏故云如汝所説但得心安足矣更何降伏耶只當如此而已故云如是唯然世尊願樂欲聞解唯然者空生直信佛心無疑矣已見佛心似不必説但諸菩薩未領其旨更欲樂聞也佛告須菩提諸菩薩摩訶薩應如是降伏其心解此佛指示安心之方法也義在下文前問安住降伏二事今只許説降伏不言安住者以凡夫二乘一向執著住處此名言習氣也今趣進大乘者先要遣此習氣以衆生涅槃俱非實法皆不可得但以名言為體耳名言既捨習氣頓空其心不待降伏而自安恬寂滅矣故但教降心不言其住者恐引習氣所謂狂心不歇歇即菩提但盡凡情別無聖解佛不以實法繫著於人故不言住所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想若非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩解此世尊直示安心觀法也然菩薩發心所求者佛果所化者衆生二者而已所以於心不安者以未見衆生如故滿目都是衆生何時方得度盡衆生不盡則佛果難求轉見長遠因此其心不安而汲汲不休故求降伏此心今佛教以度生之方以觀察無我為主且菩薩所見衆生之多難盡度者以有我相則見人相人人相對則三千界內衆生何限且生生不已宜怖其難盡也殊未見衆生本自如如耳然衆生雖多總十二類縱有無量亦只十二就十二類一一觀之收於胎卵濕化四生而已四生之內不過色心二法而已在色則不過有色無色論心亦不過有想無想縱到極頂則止於非有非無如此十二則盡衆生界矣又何多耶況十二類名為衆生衆生色心本是假合既為假合則衆生本無衆生本無但妄見有苟以本無而觀衆生則衆生本自如如衆生既如俱成寂滅即此盡皆令入無餘涅槃矣又何難哉淨名云一切衆生畢竟寂滅不復更滅如此滅度無量無數無邊衆生其實無一衆生得滅度者何以故本無我故以有我則有人有人則有衆生壽者但有此四相則不名為菩薩矣何言度生是故菩薩度生當觀無我無我則無人既無我無人則衆生界自然寂滅衆生寂滅則佛果非遙又何怖其長遠耶是故菩薩當觀無我下文云知一切法無我得成於忍此真菩薩也疑曰佛教菩薩度生以布施為本其所施者皆衆生也今衆生皆空則所作布施誰為受者故下文答云菩薩布施不必著衆生相復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相解此破著相之疑也空生因聞衆生皆空則疑謂衆生既空則菩薩布施無有受者以六塵非有衆生本空故云應無所住此教不可著衆生塵相也又伏疑云若不住相何以有福故下答以離相之福更大何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量解此破著相之疑示以離相妙行也然菩薩布施專為求福若求福之心著相則福不大故世尊權指離相之福更大使其安心然著相布施局於有相而衆生之相一微塵耳縱能獲福其福幾何今若正施衆生時不見有施者受者亦不見有所施之物如此三輪皆空無相可住不住相之福其福不可思議矣故以虗空喻之須菩提菩薩但應如所教住解此結示安心之法也前問心不能安住故須降伏世尊教以降伏之方只是以觀無我為主無我則無人人我兩忘則自心寂滅自心寂滅則一切衆生皆寂滅矣衆生既寂則佛不必求此則馳求心息取捨情忘內外皆空一心不動是則名為安心之法故結云如疑前以布施作福下化衆生只為上求佛果今既衆生相空三輪體寂是則因為虗設矣無相之因何以上求有相之果乎況現見如來身相宛然不是無相之因可得此以相見如來也故佛破云須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所説身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來解此直指無相妙行也空生由聞無相之因遂疑此因不能求有相之佛果是以相見如來也此乃著佛應化之相未見法身真體世尊徵破見相空生領旨故佛直告不可以相見如來以如來所説之身即法身也故云非身然法身亦非有相即於諸法相上見其非相即見如來矣不是如來法身捨諸法之外別有一相狀也此則無相之因契無相之果明矣疑云若以無相之因契無相之果此義甚深難信難解遂疑須菩提白佛言世尊頗有衆生得聞如是言説章句生實信不佛告須菩提莫作是説如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相何以故是諸衆生若心取相則為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者是故不應取法不應取非法以是義故如來常説汝等比邱知我説法如筏喻者法尚應捨何況非法解此直示佛之知見也由前空生初執有相之因佛以不住相布施破之復疑無相之因不能契有相之果蓋執佛有相狀也佛以法身非相破之是以無相之因契無相之果明矣如此則因果俱空人法雙泯此義甚深難信難解故疑問佛不知可有人能信此法不頗猶可也言説章句即指前無相因果之説佛答謂豈無其人但信此法者不是尋常之人乃是持戒修福者方能信耳此人亦非於一佛二佛三四五佛而種善根蓋從無量千萬佛所而種善根者所謂久種深根乃能信耳此等大根衆生即一念信心我悉知見其所得福已無量矣此無相之福勝過有相所求之福明矣何故契無相者能得多福耶蓋此衆生無復我人衆生壽者之相矣不但無此四相即一切有無諸相悉皆空矣故云無法相亦無非法相以此衆生心不取相故一切皆離苟一念取著法非法相即著四相以不取相故心境皆空得福殊勝之若此耳此是如來真知見力故我教菩薩不應取法非法相何以故以一入此法則人法皆空頓離諸取便起諸有矣豈細事哉故我常教弟子當捨法也然捨法即捨情情忘則智圓矣故曰法尚應捨何況非法疑空生因聞佛説佛非色相法不可取遂起疑云若佛與法二皆無相是無佛無法矣爭奈現見佛成菩提現今説法何以言無此疑佛自語相違也故下按破須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所説法耶須菩提言如我解佛所説義無有定法名阿耨多羅三藐三菩提亦無有定法如來可説何以故如來所説法皆不可取不可説非法非非法所以者何一切賢聖皆以無為法而有差別解此雙遣佛法知見也空生心中才萌有佛有法之念所謂意言分別也含而未吐佛逆破之故召而詰之曰於意云何謂汝意下作何分別耶且佛菩提果有所得耶如來果有所説法耶此審而詰之以勘其意空生領旨故陳其悟謂已解佛説原無定法即是菩提亦無有定法如來可説此空生深領如來不取之旨不但如來即一切賢聖皆以無為法有差別故故非可取此開權顯實之意已露一斑矣疑空生已領無佛無法之旨但不知契無為者如何得福殊勝故下如來以離相破之須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來説福德多若復有人於此經中受持乃至四句偈等為他人説其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法解此以無相之福以顯無相之法為最勝也空生已悟無相之理但不知契無相之理得無相之福此福如何勝彼有相耶故佛先以有相布施較量其福不如持四句偈之福殊勝者以一切諸佛皆從此般若而出生故故云般若是諸佛母所以福大如俗所云母因子貴故也是則般若乃是能出生佛法者而般若本非佛法也故云所謂佛法者即非佛法疑云既法無可説佛無可成俱不可得矣且世尊昔日為我等聲聞説四諦法乃是法也我等依之而修是得果也我等依涅槃而住此有所住也如何世尊一切皆非此大衆意言分別也故世尊逆舉小果逆問空生而代破之須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者世尊佛説我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不説須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行解此的示無住真宗也大衆因聞佛不可求法非可取斯則進取無可住矣爭奈世尊昔日教我聲聞令離生死安住涅槃非無法無果可住也而今世尊何以言佛法皆非此小乘未忘名言習氣執有實法難入般若故多起疑世尊假空生之悟為衆旁通故舉昔果逆徵之曰於意云何謂於汝意下如何也梵語須陀洹此云入流入逆也謂逆生死流也然言逆流但約不入六塵名為逆非是實有此可逆有彼可入而住之也斯陀含此云一往來謂有欲界一品殘思但只消一來欲界斷之則從此長往矣此亦非有來往實住處也阿那含此云不來謂永不來欲界受生如此而已亦非有不來之處可住也阿羅漢此云不生以見彼諸法一切皆無實無諸法一心不生如此而已亦未嘗作念我是阿羅漢亦非有住可之羅漢地也若阿羅漢自己作念認著我是羅漢此則與衆生知見一般即著四相矣空生以己驗之即如世尊每每稱我得了無諍三昧又讚我是人中最上之人又説我是第一離欲阿羅漢蒙世尊如此極口稱讚然我自忖己心並不曾一念生心執著我是離欲羅漢也若我有此念世尊則不説我是樂寂靜行者以我而觀昔日涅槃元無住處足知如來菩提必無可住之理矣復何疑哉此決佛果有住之疑下決佛定有成之疑疑云聞上開示佛果無住明矣既果無所成爭奈現見如來從燃燈受記是則佛定有成既有可成之佛豈無可住之果下答以無所得佛告須菩提於意云何如來昔在燃燈佛所於法有所得不不也世尊如來在燃燈佛所於法實無所得解此示究竟無得之旨也以聞無住之談已悟菩提無住遂疑菩提雖無住而佛果必定是有成若佛無成如何傳授故世尊逆問空生而決之以燃燈佛雖云授記但印契此心而已實無所得若有所得則燃燈必不與我授記疑云菩提無住佛果無得如此則不必莊嚴佛土矣而世尊何以教我行菩薩行莊嚴佛土耶須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心解此直示安心之法也空生疑謂佛既無成涅槃無住若如此又何須莊嚴佛土耶執此疑者謂度生之行實要莊嚴佛土如修寺一般此執相之愚也故世尊疑問空生菩薩果有莊嚴佛土不空生領旨答言即非莊嚴是名莊嚴何以明之然而佛土者淨土也且此淨土豈可以七寶纍砌而為莊嚴也以衆生所見者穢土乃惡業莊嚴種種苦具在諸佛所居淨土但以清淨覺心淨彼諸染染業既空則土自淨是以清淨心而為莊嚴然此莊嚴非同彼也故曰即非莊嚴是名莊嚴如此看來菩薩莊嚴佛土不假外來只是自淨其心心淨則土自淨故曰但應如是生清淨心而已不必別求莊嚴也又疑既云清淨如何生心佛言清淨如何生心但不當生六塵染心而已非有清淨可住而生心也所謂執謝情忘淨心自現故曰應無所住而生其心三祖云莫逐有緣無住空忍此為無住生心安心之法妙不過此故六祖一聞言下頓悟疑云既不莊嚴佛土是無佛土也且千丈大身之佛又何所居耶此疑報身必居實土須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛説非身是名大身解此示法身真土也因聞佛土非可莊嚴遂疑報身必居實土若不莊嚴向何居住佛以法身非身破之意謂非土之土常寂光也非身之身乃法身也法身非相真土無形然身既不可以相見而土又何可以莊嚴耶此從離六塵相離心緣相以來所破羣疑直至身土皆空心境雙絶始是般若極則以顯法身無住之理故開導至此理極忘言但有信此法者其福無量故下較量福德須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人説而此福德勝前福德復次須菩提隨説是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處則為有佛若尊重弟子解此以喻顯法殊勝也説四句之福勝河沙七寶者以此法乃最上第一希有之法也以此四偈即法身全體故如佛住世與弟子宣説無二故也前顯法身已圓羣疑頓破言忘理極故空生領旨遂請結經名爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛説般若波羅蜜即非般若波羅蜜是名般若波羅蜜解此指歸般若實際也空生領悟般若全體已露更無餘法故問結經名世尊但告之曰是經名為金剛般若波羅蜜意謂此法無名但此心耳又問如何奉持告以即以此心奉持此法以心本非心而法亦非法故曰般若即非般若波羅蜜前未聞此法時其心未安故初請降伏以所知所見滿目塵境生佛迢然淨穢殊途取舍異趣故其心不安難以降伏特起種種疑情初疑衆生難度則告以衆生本空又疑佛果難求則告以佛不必求次疑布施難周則告以三輪空寂次疑佛土難嚴則告以心淨則嚴次疑報身無寄則告以法身無依到此空生伎倆已窮羣疑氷釋佛心已盡披露無復遺餘所以聞者心安而自降伏矣故問結經名世尊不以實法贅人但名此心而已故以此結之下文乃單示法身極則所謂百尺竿頭更進一步只須具金剛眼始得極盡相應故空生感悟流涕讚歎難量似久客還家宜其見慈母而生悲泣也直至不可思議而後已須菩提於意云何如來有所説法不須菩提白佛言世尊如來無所説解空生已悟法身之理遂疑法身非相誰當説法此計法有所説也故佛徵詰乃悟身既非身法亦無説疑云法身非相然非相即墮斷滅斷滅無相當於何處見法身耶衆有此疑故佛徵破須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來説非微塵是名微塵如來説世界非世界是名世界解此示諸法雖空不入斷滅也聞説法身非相遂疑墮斷滅斷滅則無處覓法身矣世尊示以塵塵剎剎皆法身也故詰之曰三千大千世界所有微塵是為多不答言甚多若以微塵世界而觀則滿目塵境萬象樅然若以非微塵世界而觀則一道虗間真空冥寂所謂寂滅靈虗寄森羅而顯象縱橫幻境在一性而融真所以青青翠竹總是真如黃華無非般若山河及大地全露法王身要見法身須具金剛正眼始得故曰世界非世界是名世界疑所聞法身非相方名為佛若非相是佛即今現前三十二相之佛豈非佛耶此認化身為真佛也下以法化一體破之須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來説三十二相即是非相是名三十二相解此示法化冥一也莫謂有相非佛即今三十二相本非有相相即非相則應身即法身矣到此三身一體身土皆空理極情忘言詞相寂故但讚歎能契此理轉教之者其福無量須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人説其福甚多解此顯法空勝益也世尊顯理已極羣疑已破四相頓空我執既亡法身獨露故世尊較量布施恆沙身命之多不若深心受持四句偈為他人説其無相之福真不可量矣空生全領此旨感激未聞故涕淚悲泣讚歎希有此正前云善護念善囑付者以此故也已前領悟已下陳情爾時須菩提聞説是經深解義趣涕淚悲泣而白佛言希有世尊佛説如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨即生實相當知是人成就第一希有功德世尊是實相者即是非相是故如來説名實相世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人即為第一希有何以故此人無我相人相衆生相壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相即名諸佛佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有何以故須菩提如來説第一波羅蜜即非第一波羅蜜是名第一波羅蜜解此印契佛心入佛知見也若空生輩諸小乘人與諸衆生皆執相之徒也即佛出世以來二十餘年所説諸法未曾離相恐生驚疑故而教之多方淘汰至今方始露出本心何以故以佛本願欲令一切皆趣大乘究竟之地故今將引昔小乘發大乘心特以此金剛心地為本修因故先用此心斷彼羣疑令生正信故此般若乃入大乘之初門為菩薩發覺之初心所謂護念付囑者此心也以小乘弟子一向未聞而今始聞之從昔未解而今始悟之如失乳兒忽遇慈母所以空生一聞感激涕零宜其然也故讚歎希有前歎希有乃忽爾覷見世尊此一片心尚未備聞其説今蒙世尊吐露重重逐破消盡羣疑此真希有之心也蓋從昔已來所未聞者誠希有之法也空生自陳已悟又激發同輩意謂我聞而悟自謂希有矣若再有一人聞而能信自心清淨如此者則實相現前諸妄消滅此人亦自希有之人矣何以故以離相之法最難信解故也且我輩親見如來雖是難信然聞佛妙音即信解亦不難若佛滅後去聖時遙後五百歲五濁惡重魔強法弱之時能信此法者甚為難也苟有能信者則為第一希有之人也何以故以此人能離四相故然四相本是如如了此即見法身矣故曰能離一切相即名為佛此真希有也世尊聞説乃印許之曰如是如是誠如所説以此法大機小聞者皆生驚疑怖畏故也苟聞而不驚疑怖畏者甚希有也以我所説不在言故故曰即非第一是名第一疑前言布施乃六塵受用之物外施也一向難捨已捨即捨亦要求福世尊已教不許住相已説無相之福更大既而又説不但七寶布施不比無相之福即將恆沙身命布施之福亦難比之以身命內施也故空生遂疑謂外施可忘身命難捨如何能捨耶世尊逆知其意故特説忍辱行以破之割截身體而不嗔恨則我空矣此是當機疑意如此其經中密意乃世尊密破菩薩我法二執然我執即五蘊身心且此五蘊身有假名有實法前破假名今以割截身體驗破五蘊實法也須菩提忍辱波羅蜜如來説非忍辱波羅蜜是名忍辱波羅蜜何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生嗔恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住即為非住是故佛説菩薩心不應住色布施須菩提菩薩為利益一切衆生故應如是布施如來説一切諸相即是非相又説一切衆生即非衆生解此破五蘊實法結答云何應住之問也空生一聞身命布施不達五蘊本空遂疑而不信甚以為難謂外施七寶不住於相猶可能也若捨身命則不能矣不捨身命則我相未空既然著相難契真空故世尊特説忍辱之行當歌利王割截身體之時若我四相未忘則生嗔恨矣所以不嗔者以達五蘊本性空故所謂割水吹光湛然不動者以離一切相也是故我教菩薩當離一切相發菩提心者不應住於六塵生心應當生無所住之心也此結前文總會離相之旨以答云何應住之問也又示之曰若心有住則心境俱妄則為非住是故佛説菩薩不應住於色相而行布施者此也然菩薩既為利益一切衆生應當如是布施方為妙行不可執著別生臆見也以如來説一切相皆是真如説一切衆生即是真如所以前云若見諸相非相即見如來故結示云諸相即是非相衆生即非衆生疑既云不住於相則一切皆空空即能證之智亦空無體矣無體之法安可作因而取果耶答意誡令但當諦信佛言是如來自證境界決不虗妄須菩提如來是真語者實語者如語者不誑語者不異語者須菩提如來所得法此法無實無虗解此結令諦信也空生聞佛所説因果皆空疑謂果空則不必用因因空則不能得果今因中行施況不住生心則無實果可證矣世尊誡以但當諦信佛言不必多起疑念以如來所得之法非實非虗不可以執著之情而求之也以此破之疑不住相布施生心即此不住生心何以得合般若下答破須菩提若菩薩心住於法而行布施如人入暗則無所見若菩薩心不住法而行布施如人有目日光明照見種種色解此示無住之益也有住之心屬於無明為心境障故如人入暗一無所見無住之心諸障盡撤人我兩忘如日升天朗照萬象故此無住之心即真實般若佛所證者此心而已疑且此無住之心縱是般若如何能契佛心下答破須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解説解此示心佛平等也空生之疑將謂己智不能契合佛智佛意般若無文字文字即般若然我説此經即全體般若但有人能信受者則為妙契佛智而佛以本智了知其人無量功德矣此一念頓契佛心之功德縱使一日三時以恆沙身命布施功德其福固多但不若有一念信心隨順般若而不逆者可謂善入佛慧矣其福更大何況書寫受持讀誦為人解説耶下讚般若殊勝須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者説為發最上乘者説若有人能受持讀誦廣為人説如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等即為荷擔如來阿耨多羅三藐三菩提何以故須菩提若樂小法者著我見人見衆生見壽者見即於此經不能聽受讀誦為人解説解此讚般若獨被上上根人前屢言著四相故粗今言著四見故細須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍繞以諸華香而散其處解此讚般若法身常住復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅當得阿耨多羅三藐三菩提解此讚般若有離障出纏之益不但滅罪且得勝果須菩提我念過去無量阿僧祇劫於燃燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具説者或有人聞心則狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議解此讚悟般若者一念頓生佛家生生世世永不離佛故此功德最為殊勝也後世末法之中有能信者其功更大以此般若之德不可思議故果報亦不可思議從初問云何應住云何降伏其心以來通破凡夫中大心衆生修菩薩行者所執之疑然所執我法二執有粗有細已前破粗二執以所執五蘊身心為我執我所作為緣塵六度之行欲求菩提者為法執然此二執皆著相故是破初發心菩薩未悟般若者之疑但意顯下不見有衆生可度也此後乃破微細我法二執是已悟般若之菩薩但執有能證之智為我有所證真如為人能證能悟為衆生證悟未忘潛續如命為壽者而此四相最極微細故為微細二執所謂存我覺我故向下發揮但標我字若破此我執則上不見有佛果可求也經文與前問同意別觀者應知爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提若善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者解從此以下徵破微細我法二執也經初問云何應住云何降伏其心者以初發心菩薩乃凡夫中大心衆生始發度生之心故種種著相以依著自己五蘊色身修行其所行布施乃執著六塵粗物而求福果其所求菩提乃執著化佛色相之身其土乃寶物莊嚴之土種種所行皆不離相故去般若遠甚空生起疑被佛重重破斥直至一切色相皆離方契真如般若實智而空生已悟大衆疑消此經文不可思議已前半卷皆此意也其所破我依凡夫見起即五蘊色相之我其四相皆粗今此經文以下乃是破已悟般若之菩薩但能證之智未忘以此執著為我此是存我覺我之我乃微細我法二執四相皆細故此經中標出一我字為首但云我應滅度衆生更不言布施是知功行已圓唯有生佛之見未泯耳故前粗後細問然此細智為我而又問云何應住云何降伏其心與前問意同者何也答此問住蓋此菩薩已離五蘊但習氣未忘故於真如智中亦求安住且急急欲求菩提執謂菩提有所住處求而不得其心不安故問降伏此求佛之心未安以生佛之見未泯不達平等一如耳問同意別故世尊破云發菩提者當作此觀我滅度一切衆生已實無有一衆生得滅度者以衆生本自如如不待更滅若執有滅度則著四相非菩薩矣此不見有衆生可度也然生佛本來平等若衆生既無可滅而此中實無有法可容菩薩發心求菩提者何以故以衆生本自寂滅即是菩提又何容其更求耶此不見有佛果可求也疑既實無法可得菩提且我所悟之般若豈非法耶即世尊於燃燈佛所因得此法乃得成佛豈非得菩提耶何言無法可得故下破之須菩提於意云何如來於燃燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所説義佛於燃燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者燃燈佛即不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故燃燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼解此示菩提無得以破執佛之疑也空生疑佛於燃燈佛所實有法可得世尊展轉逐破妄計正顯實無一法可得疑謂般若之法乃成佛真因今云無法則無因矣無因如何得菩提果下以法身不屬因果破之何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來説一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法須菩提譬如人身長大須菩提言世尊如來説人身長大則為非大身是名大身解此顯法身不屬因果也空生不達法身真體不屬因果乃執定如來是有修有得故佛以無所得破之矣猶恐不悟乃直示之曰何故言菩提無所得耶以如來者非色相之稱乃是諸法當體如如之義耳且諸法本自如如豈假修為證得耶故我説菩提實無有法容佛可得宗門謂向上一路三世諸佛不許覷著著則眼瞎以此中無你取覓處故也如來菩提並無甚奇特但於諸法不起斷常顛倒見耳故言無實無虗以一切法皆非法故若知大身非身則知諸法非法疑因聞實無有法容其發心遂疑云以我有此度生之法方名菩薩既無有法何以得菩薩之名耶下以無法無我破之須菩提菩薩亦如是若作是言我當滅度無量衆生即不名菩薩何以故須菩提實無有法名為菩薩是故佛説一切法無我無人無衆生無壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來説莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來説名真是菩薩解此示法身無我例破菩薩微細二執也空生執有法度生方名菩薩世尊告以實無有法以遣法執恐疑無法度生如何莊嚴佛土故世尊示以常寂光土不假莊嚴以遣住心破我執此二無我也苟不達此理則非真菩薩矣故云通達無我法者如來説名真是菩薩疑若菩薩不見衆生可度無土可淨如此如來要五眼作麼下約知衆生心為眼非實有五眼破之須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼須菩提於意云何如恆河中所有沙佛説是沙不如是世尊如來説是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來説諸心皆為非心是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得解此示心佛衆生三無差別也空生疑佛具五眼將謂有法可見有世界衆生當情世尊告以所具五眼非眼也但約見衆生心為眼耳且如恆沙世界無量衆生若干種心如來悉知悉見者以衆生乃如來自心之衆生故衆生凡動一念即如來自心動也如何不知不見耶又疑衆生心有生滅如來心亦生滅耶故世尊言此中衆生心本自如如了無生滅與如來心寂滅平等故如來衆生湛然不動絶無生死去來之相所謂心佛與衆生是三無差別故三際求心了不可得疑世尊一往破執謂無土可嚴無生可度恐空生聞而轉計將謂生土皆空則布施無福亦不必修矣故世尊以無福之福其福甚大破之須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不説得福德多以福德無故如來説得福德多解此示無相之福也空生執著有相布施將謂實有福德殊不知能施六塵本空則所得福德非有故世尊以福德無故福德多破之所言無者非絶無也以心量如空故得福益大疑空生因聞不許住相度生嚴土遂起疑云且度生嚴土乃成佛之因所感萬德具足莊嚴之果今云無生可度無土可嚴是絶無因也又云無菩提可證是無果也因果皆絶是無佛矣即今現見如來具足色相又從何而有耶故佛以不應具足色相見如來破之須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來説具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來説諸相具足即非具足是名諸相具足解此破執報身色相之見以顯法報冥一也具足色身者萬德莊嚴報身佛也以多劫度生莊嚴佛土感此果報以酬因故如來説具足色身且此報身本法身也故云即非具足色身法報冥一故云是名具足色身此破所見之相下破能見之見以報身即法身故無相可見智體如如故見病消亡境智冥一故法身自顯凡言是言非者皆遮救之辭也恐落是非窠臼故左右遮之遣之故如來説法本無可説但遮護衆生之心病不容起見遣其執情令不住著如此而已學者應知疑空生聞説佛本無相可見遂疑既無身相誰當説法故佛以無可説破之須菩提汝勿謂如來作是念我當有所説法莫作是念何以故若人言如來有所説法則為謗佛不能解我所説故須菩提説法者無法可説是名説法解此破報身如來有所説法之疑也如來出世本無法可説但就衆生所執之情隨宜而擊破之唯一字而已凡曰非曰不乃遮止之辭以遮止衆生之妄想耳正是護念之意也故曰是名説法疑空生已悟法身之理無説無示以此法甚深但未來衆生不知可能信受不故起此疑向下以無衆生破之爾時慧命須菩提白佛言世尊頗有衆生於未來世聞説是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來説非衆生是名衆生解此示生法一如以破衆生見也空生妙悟法身已能信能受矣第此法甚深不知可有衆生於未來世能信此法不此空生生滅之見未亡故起未來衆生之見世尊答以衆生本如與法平等何有未來之相耶以衆生如如三際平等此實般若究竟之極則也彼非衆生等六句謂衆生本自如如故曰彼非衆生以真如隨緣而成衆事故曰非不衆生乃復釋之曰所言衆生乃是真如隨緣衆法和合而相生故云衆生者以假名衆生故如來説非實是衆生以非實有生是故名為衆生耳疑法身無相無法可得如何言修一切善法證得菩提耶下以無得平等破之須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法即得阿耨多羅三藐三菩提須菩提所言善法者如來説即非善法是名善法解此破佛法見也空生已悟法身清淨無法可得翻疑佛説修一切善法而得菩提是有得也豈如來菩提果無所得耶佛言實無所得以生佛平等無二無別即是菩提如此而已豈實有所證得耶所言修善法而得菩提者但以離四相而修以修即無修故得亦無得以無所得故是名真善法也疑善法既非何法為勝下以達般若者最為殊勝須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人説於前福德百分不及一百千萬億分乃至算數譬喻所不能及解此讚般若離相之功最勝也且修善法不得菩提是則善法非殊勝矣又以何法為殊勝耶佛言達般若者最為殊勝三千世界中有百億須彌山以七寶等此可謂多矣以此布施之福不如達般若四句之福以彼執相貪求利益故般若離相故超勝無量非喻可及疑空生聞前説生佛平等然既平等則無衆生矣何言如來當度衆生是有我人之相也下以人我兩忘破之須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來即有我人衆生壽者須菩提如來説有我者則非有我而凡夫之人以為有我須菩提凡夫者如來説即非凡夫是名凡夫解此破佛有人我之疑以顯法身真我也所云生佛平等平等則無佛無衆生何言我當度衆生耶衆生人也我度衆生則有我矣人我宛然則四相不泯此正宗門所謂得到法身邊未透法身向上句也故世尊以言遣之故云勿謂如來我有度生之念我有此念即是凡夫然如來説凡夫尚非凡夫豈可如來尚存我見耶此則聖凡俱泯一道齊平般若玄旨於斯極矣疑法身既非有我報身不可以相見即今三十二相豈非佛耶須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提白佛言世尊如我解佛所説義不應以三十二相觀如來爾時世尊而説偈言若以色見我以音聲求我是人行邪道不能見如來解此示應化非真以顯法身離相也空生已悟法身無我報身非相是為真佛遂疑現見三十二相是何佛耶是有佛見也世尊詰之曰果可以三十二相見如來乎空生執以三十二相必定是佛世尊以轉輪聖王破之遂悟不可以三十二相觀如來世尊示之以離相偈云若以色見我以音聲求我是人行邪道不能見如來疑空生聞説法報無相應化非真故起法身斷滅之見以不達法身真我故佛以不斷滅破之須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者説諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不説斷滅相須菩提若菩薩以滿恆河沙等世界七寶持用布施若復有人知一切法無我得成于忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故説不受福德解此破斷滅見也空生聞説當以離相見佛遂起斷滅見謂如來不以具足相故得菩提佛教之曰莫作是念若作是念則説諸法斷滅矣然發菩提心者於法不説斷滅相但説知一切法無我而已若復有人知一切法無我得成于忍此菩薩勝過滿恆沙界七寶布施之功德以不受福德故也所言不受者非絶無也但不貪著福德耳所謂無作無造無受者善惡之業亦不忘世尊出世説法四十九年止説一無字而已以九界衆生通執一切法有我如來但以無字破之此金剛正眼直觀向上一路故宗門單傳直指唯從此入疑既言無我無受福者則現見如來行住坐臥豈非如來之我耶此乃三身一異之見未泯未悟平等法身故也須菩提若有人言如來若來若去若坐若臥是人不解我所説義何以故如來者無所從來亦無所去故名如來解此會歸法身真際也空生向以威儀動靜者為如來此特去來之見耳如來豈有去來耶至此執謝情忘動靜不二如如實際妙極于斯但一異之見未忘三身一體之義未契故下以微塵世界破之須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不須菩提言甚多世尊何以故若是微塵衆實有者佛即不説是微塵衆所以者何佛説微塵衆即非微塵衆是名微塵衆世尊如來所説三千大千世界即非世界是名世界何以故若世界實有者即是一合相如來説一合相即非一合相是名一合相須菩提一合相者即是不可説但凡夫之人貪著其事解此破一異見也空生未契三身一體故世尊以微塵世界非一非異示之言微塵則非一世界即非異微塵聚而為世界即異而不異世界散而為微塵即一而不一由是觀之一異之相了不可得以不可得故非實有也若實有一異之相即為一合相矣一合者邊見也以合一即不能異合異即不能一故若微塵實有即不能聚而為世界若世界實有則不能散而為微塵愚夫以此為一合相如來説一合相則不然以離二邊故名一合二邊既離即是不可説矣但凡夫之人不能遠離有無一異二邊貪著其事故不能達三身一體平等法身之理也疑既平等法身一切皆非即不可見又何以佛説有四相見耶故下伏破須菩提若人言佛説我見人見衆生見壽者見須菩提於意云何是人解我所説義不不也世尊是人不解如來所説義何以故世尊説我見人見衆生見壽者見即非為遣衆生之我見人見衆生見壽者見耳以此是名衆生之我見人見衆生見壽者見原非佛説有此四見也須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來説即非法相是名法相解此破執有離相之見也空生已悟平等如如法身之理遂疑法身之體既不可以相見如何世尊説離四相之見耶佛恐空生伏懷此疑故詰之曰假若有人言世尊説有四相之見者汝謂此人解我所説之意不空生遂悟佛意答言此人不解如來所説義何以故以世尊説有四相之見者非是實有相見可指説也將為遣有相見者之執情耳故曰非此非字與諸非字不同前屢言非皆不是之義今此非字乃遣絶之辭謂遣衆生心中所執之相見耳非佛説有此相見乃衆生之相見耳故曰是名此是名二字亦與屢説者不同宜深觀之蓋一切衆生迷倒於相見之中所執堅固難破故佛以金剛心智以逐破之令見本智法身真體初執見有五蘊身心及六塵相故著相行施以求佛福德世尊以無住破之次執有菩提相佛以無所得破之次執布施有莊嚴佛土相佛以無土可嚴破之次執福德以感報相佛以非具足色身破之次執如來定有三身相佛以應化非真報身離相破之次執定有法身相佛以法身非相破之次執法身定有實我相佛以一切法無我破之次執如來定有三身相佛以非一非異破之重重逐破一切皆非諸相銷亡一心無寄理極情忘直指法身實際以所見之妄相既空則能見之妄見亦泯此真實般若究竟極則直透法身向上一路故佛誡之曰發菩提心者於一切法應如是知如是見如是信解不生法相到此始是真知真見真信真解則永不起一切法相知見矣斯則人法雙忘聖凡俱泯言語道斷心行處滅舉心即錯動念即乖故復遣之曰所云法相亦非法相始是真實法相非妄見者可比也般若玄旨妙極於斯疑空生已悟法身全體遂疑法身不會説法其説法者乃化身耳且化身所説之法不達法身境界如何持此法者得福德耶下以化身所説即真實法以三身一體故須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼云何為人演説不取於相如如不動解此示化身佛説如如法也空生疑化身佛所説之法不到法身境界如何得福佛言化身説即法身説以三身不異故即於此法能持四句為人演説其福最勝以不取於相如如不動故到此塵説剎説熾然説也疑法身寂滅如何寂而能説下示正觀以般若空寂從假觀入從假入空故名真空以假即真故何以故一切有為法如夢幻泡影如露亦如電應作如是觀解此入般若真空妙觀也以真空冥寂藉假而觀若六喻觀成則真空自現一往俱顯理體此則正示觀法諸修行人當從此入法身真境極盡於斯佛説是經已長老須菩提及諸比邱比邱尼優婆塞優婆夷一切世間天人阿修羅聞佛所説皆大歡喜信受奉行解此結經者常規也凡所聞歡喜必妙契於心契則信之真受之切而奉行不虗矣
