front:
  text: 刻金剛決疑題辭般若為諸佛母菩薩之真因眾生之佛性生靈之大本也由向背之分故有聖凡之別是知眾生日用現前見聞知覺皆般若之光端在信不信耳故曰諸佛智海以信得入靈山一會得度弟子雖出生死而不信此法無成佛之分勞我世尊多方淘汰種種彈呵而劣解之徒展轉生疑以為非己智分以疑根未拔故本智不現及至般若會上如來以金剛智而決斷之直使聖凡情盡生滅見亡而本有智光豁然披露始信自心清淨了無一法為己障礙此金剛般若直拔疑根為發最上乘者說殊非淺識薄德所能解故黃梅以此印心以其一法不立是為宗門正眼也昔天親列二十七疑解此一經以疑潛言外而此方義學執筌失指從前得意忘言者希予自幼能誦而長不解每思六祖大師一言之下頓了此心何世無悟入之人由正眼不開返為性障因住曹溪偶為大眾發揮一過恍然有悟而言外之疑頓彰心目信乎此法離文字相非思量分別所能解也因拈示一斑以當法施初刻之嶺南再刻於五雲又刻於南嶽門人方玉見而信受茲復刻於吳門將廣願四眾同開金剛正眼的信自心則成佛正因將以是為嚆矢也丙辰長至月憨山清道人撰
